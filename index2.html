<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace; overflow-x: hidden;
        }

        /* 1. Fake 404 Error Screen */
        #introScreen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background-color: #f8f9fa; color: #202124;
            font-family: 'Segoe UI', Arial, sans-serif; text-align: center;
        }
        #introScreen h1 { font-size: 120px; margin: 0; color: #333; font-weight: bold; letter-spacing: -5px;}
        #introScreen h2 { font-size: 30px; margin: 10px 0 20px 0; font-weight: normal; color: #5f6368; }
        #introScreen p { font-size: 16px; color: #5f6368; margin-bottom: 40px; max-width: 500px; line-height: 1.5; }
        #fixErrorBtn {
            padding: 14px 30px; font-size: 16px; font-weight: bold; letter-spacing: 1px;
            background-color: #1a73e8; color: white; border: none; border-radius: 6px;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3);
        }
        #fixErrorBtn:hover { background-color: #1557b0; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26, 115, 232, 0.5); }

        /* 2. Hack Screen (Love Virus Terminal) */
        #hackScreen { 
            display: none; height: 100vh; background-color: #050505; 
            padding: 20px; box-sizing: border-box;
        }
        #terminal {
            max-width: 800px; margin: 50px auto; background: #0a0a0a;
            border: 1px solid #ff4757; border-radius: 8px; padding: 20px;
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.2);
            height: 70vh; overflow: hidden; position: relative;
        }
        .terminal-header {
            color: #ff4757; border-bottom: 1px solid #333;
            padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; letter-spacing: 2px;
        }
        .command-line {
            color: #ff4757; margin-bottom: 10px; font-size: 18px;
            opacity: 0; transform: translateY(10px);
            transition: all 0.3s ease-out; text-shadow: 0 0 5px rgba(255, 71, 87, 0.4);
        }
        .command-line.visible { opacity: 1; transform: translateY(0); }
        .cursor { display: inline-block; width: 10px; height: 18px; background: #ff4757; animation: blink 0.8s infinite; box-shadow: 0 0 10px #ff4757;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 3. Reveal Screen (Surprise & 3D Cake) */
        #revealScreen {
            display: none; position: relative; min-height: 100vh;
            background: radial-gradient(circle at center, #1a0b14 0%, #000000 100%); overflow: hidden; cursor: pointer;
        }
        .cake-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.9;
        }
        .reveal-content {
            position: relative; z-index: 2; text-align: center;
            padding-top: 10vh; pointer-events: none;
        }
        .reveal-content h1 {
            color: #fff; font-size: 60px; margin-top: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0 0 20px #ff4757, 0 0 40px #ff4757; 
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 20px #ff4757, 0 0 30px #ff4757; transform: scale(1); }
            100% { text-shadow: 0 0 30px #ff4757, 0 0 50px #ff4757, 0 0 70px #ff6b81; transform: scale(1.02); }
        }

        #romanticMessage {
            color: #ffd1d8; font-size: 26px; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 300; opacity: 0; transition: opacity 1.5s ease-in-out; min-height: 40px; margin-top: 15px; margin-bottom: 5px;
        }
        .show-text { opacity: 1 !important; } 

        /* --- NEW TOAST NOTIFICATION CSS --- */
        #toastContainer {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 15px; pointer-events: none;
        }
        .toast {
            background: rgba(15, 15, 15, 0.95); border-left: 5px solid #ff4757;
            color: #fff; padding: 15px 25px; border-radius: 4px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
            transform: translateX(120%); transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-width: 250px; max-width: 350px;
        }
        .toast.show { transform: translateX(0); }
        .toast-title {
            color: #ff4757; font-weight: bold; font-size: 13px;
            margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase;
        }
        .toast-message { font-size: 16px; line-height: 1.4; }

        /* 4. Heart Transition Screen */
        #transitionScreen {
            display: none; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background-color: #050002; text-align: center;
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100;
        }
        .big-heart { font-size: 120px; animation: heartBeat 0.8s infinite alternate; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(255, 71, 87, 0.8)); }
        @keyframes heartBeat { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        .transition-text {
            color: #fff; font-size: 28px; font-weight: 300; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.6); padding: 0 20px; line-height: 1.4;
        }

        @media screen and (max-width: 768px) {
            #introScreen h1 { font-size: 80px; }
            .command-line { font-size: 14px; }
            .reveal-content h1 { font-size: 38px; }
            #romanticMessage { font-size: 20px; padding: 0 20px; margin-bottom: 3px;}
            #toastContainer { right: 10px; left: 10px; top: 10px; align-items: center; }
            .toast { width: 90%; max-width: none; }
        }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <audio id="hbdSong" src="./img_voice/saavane-happy-birthday-254480.mp3"></audio>

    <div id="introScreen">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The requested URL was not found on this server. Please try to fix the error to continue.</p>
        <button id="fixErrorBtn">Fix Error</button>
    </div>

    <div id="hackScreen">
        <div id="terminal">
            <div class="terminal-header">ROOT@HACKER:~/Surprise_Target_Device</div>
            <div id="terminalBody"></div>
            <div class="cursor"></div>
        </div>
    </div>

    <div id="revealScreen">
        <iframe class="cake-background" frameborder="0" src="https://sketchfab.com/models/29eb6a4e7bf8403fb05cc2495bfc2dd9/embed?autospin=1&autostart=1&transparent=1&ui_hint=0&ui_theme=dark&ui_watermark=0&ui_infos=0&ui_settings=0&ui_vr=0&ui_fullscreen=0&ui_animations=0"></iframe>
        <div class="reveal-content">
            <h1>Happy Birthday Bby lay</h1>
            <p id="romanticMessage"></p>
        </div>
    </div>

    <div id="transitionScreen">
        <div class="big-heart">❤️</div>
        <div class="transition-text">System Restored.<br>Now, let me show our beautiful memories...</div>
    </div>

    <script>
        const introScreen = document.getElementById('introScreen');
        const hackScreen = document.getElementById('hackScreen');
        const revealScreen = document.getElementById('revealScreen');
        const transitionScreen = document.getElementById('transitionScreen');
        const fixErrorBtn = document.getElementById('fixErrorBtn');
        const romanticMessage = document.getElementById('romanticMessage');
        const hbdSong = document.getElementById('hbdSong');
        const terminalBody = document.getElementById('terminalBody');
        const toastContainer = document.getElementById('toastContainer');

        const commands = [
            "> Establishing secure connection... [SUCCESS]",
            "> Initializing LoveVirus.exe...",
            "> Bypassing logic circuits... [OK]",
            "> Scanning for target...",
            "> Danger: Extremely high levels of beauty detected!",
            "> Locking onto target: Myat Noe Khin 😍",
            "> Executing steal_heart.sh...",
            "> 25% completed... (She's smiling)",
            "> 50% completed... (Almost there)",
            "> 75% completed... (Gotcha!)",
            "> 100% COMPLETED!",
            "> WARNING: YOUR HEART HAS BEEN PERMANENTLY HACKED!",
            "> Redirecting payload to Birthday.Surprise..."
        ];

        async function runTerminal() {
            for (let i = 0; i < commands.length; i++) {
                let div = document.createElement('div');
                div.className = 'command-line';
                div.innerText = commands[i];
                terminalBody.appendChild(div);
                
                await new Promise(r => setTimeout(r, 450));
                div.classList.add('visible');
                
                terminalBody.scrollTop = terminalBody.scrollHeight;
            }
            
            setTimeout(() => {
                hackScreen.style.display = 'none';
                revealScreen.style.display = 'block';
                document.title = "Happy Birthday Myat Noe Khin!";
                hbdSong.play();
                startRomanticTexts();
            }, 1200);
        }

        // --- NEW TOAST FUNCTION ---
        function showToast(title, message, duration) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            `;
            toastContainer.appendChild(toast);
            
            // Slide in
            setTimeout(() => toast.classList.add('show'), 100);
            
            // Slide out and remove
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500); // Wait for CSS transition to finish
            }, duration);
        }

        function startRomanticTexts() {
            // 1st Toast popup
            setTimeout(() => {
                showToast("SYSTEM UPDATE", "You successfully fix this website error...", 4000);
            }, 1000);
            
            // 2nd Toast popup (Shows after the 1st one disappears)
            setTimeout(() => {
                showToast("SYSTEM COMPROMISED!", "But there's a bug in my system... it can't stop beating for you ❤️", 4500);
            }, 5500); 

            // Final Center Text (Shows after 2nd toast disappears)
            setTimeout(() => {
                romanticMessage.innerText = "Tap anywhere on the screen 👉👈";
                romanticMessage.classList.add('show-text');
            }, 10500); 
        }

        fixErrorBtn.addEventListener('click', () => {
            introScreen.style.display = 'none';
            hackScreen.style.display = 'block';
            document.title = "SYSTEM COMPROMISED!";
            runTerminal();
        });

        revealScreen.addEventListener('click', () => {
            revealScreen.style.display = 'none';
            transitionScreen.style.display = 'flex';
            setTimeout(() => { window.location.href = 'memories2.html'; }, 4000);
        });
    </script>
</body>
</html>
