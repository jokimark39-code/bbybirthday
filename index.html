<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace; overflow-x: hidden;
        }

        /* 1. Fake 404 Error Screen */
        #introScreen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background-color: #f8f9fa; color: #202124;
            font-family: 'Segoe UI', Arial, sans-serif; text-align: center;
        }
        #introScreen h1 { font-size: 120px; margin: 0; color: #333; font-weight: bold; }
        #introScreen h2 { font-size: 30px; margin: 10px 0 20px 0; font-weight: normal; color: #5f6368; }
        #introScreen p { font-size: 16px; color: #5f6368; margin-bottom: 40px; max-width: 500px; }
        #fixErrorBtn {
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            background-color: #1a73e8; color: white; border: none; border-radius: 4px;
            cursor: pointer; transition: 0.2s;
        }
        #fixErrorBtn:hover { background-color: #1557b0; }

        /* 2. Hack Screen (Love Virus Terminal) */
        #hackScreen { 
            display: none; height: 100vh; background-color: #000; 
            padding: 20px; box-sizing: border-box;
        }
        #terminal {
            max-width: 800px; margin: 50px auto; background: #000;
            border: 1px solid #ff0000; border-radius: 8px; padding: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            height: 70vh; overflow: hidden; position: relative;
        }
        .terminal-header {
            color: #ff0000; border-bottom: 1px solid #ff0000;
            padding-bottom: 10px; margin-bottom: 20px; font-weight: bold;
        }
        .command-line {
            color: #ff0000; margin-bottom: 10px; font-size: 18px;
            opacity: 0; transform: translateY(10px);
            transition: all 0.2s;
        }
        .command-line.visible { opacity: 1; transform: translateY(0); }
        .cursor { display: inline-block; width: 10px; height: 18px; background: #ff0000; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 3. Reveal Screen (Surprise & 3D Cake) */
        #revealScreen {
            display: none; position: relative; min-height: 100vh;
            background-color: #111; overflow: hidden; cursor: pointer;
        }
        .cake-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .reveal-content {
            position: relative; z-index: 2; text-align: center;
            padding-top: 15vh; pointer-events: none;
        }
        .reveal-content h1 {
            color: #ff4757; font-size: 50px; margin-top: 20px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        #romanticMessage {
            color: #fff; font-size: 22px; text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
            font-weight: bold; opacity: 0; transition: opacity 1s; min-height: 30px;
        }
        .show-text { opacity: 1 !important; } 

        /* 4. Heart Transition Screen */
        #transitionScreen {
            display: none; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background-color: #111; text-align: center;
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100;
        }
        .big-heart { font-size: 100px; animation: heartBeat 1s infinite; margin-bottom: 20px; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .transition-text {
            color: #ff4757; font-size: 26px; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(255, 71, 87, 0.5); padding: 0 20px;
        }

        @media screen and (max-width: 768px) {
            #introScreen h1 { font-size: 80px; }
            .command-line { font-size: 14px; }
            .reveal-content h1 { font-size: 32px; }
            #romanticMessage { font-size: 18px; }
        }
    </style>
</head>
<body>

    <audio id="hbdSong" src="saavane-happy-birthday-254480.mp3"></audio>

    <div id="introScreen">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The requested URL was not found on this server. Please try to fix the error to continue.</p>
        <button id="fixErrorBtn">Fix Error</button>
    </div>

    <div id="hackScreen">
        <div id="terminal">
            <div class="terminal-header">ROOT@HACKER:~/Surprise_Target_Device</div>
            <div id="terminalBody"></div>
            <div class="cursor"></div>
        </div>
    </div>

    <div id="revealScreen">
        <iframe class="cake-background" frameborder="0" src="https://sketchfab.com/models/29eb6a4e7bf8403fb05cc2495bfc2dd9/embed?autospin=1&autostart=1&transparent=1&ui_hint=0&ui_theme=dark&ui_watermark=0&ui_infos=0&ui_settings=0&ui_vr=0&ui_fullscreen=0&ui_animations=0"></iframe>
        <div class="reveal-content">
            <h1>Happy Birthday My Love!</h1>
            <p id="romanticMessage"></p>
        </div>
    </div>

    <div id="transitionScreen">
        <div class="big-heart">❤️</div>
        <div class="transition-text">Now, my heart is healthy and<br>I will show you our memories...</div>
    </div>

    <script>
        const introScreen = document.getElementById('introScreen');
        const hackScreen = document.getElementById('hackScreen');
        const revealScreen = document.getElementById('revealScreen');
        const transitionScreen = document.getElementById('transitionScreen');
        const fixErrorBtn = document.getElementById('fixErrorBtn');
        const romanticMessage = document.getElementById('romanticMessage');
        const hbdSong = document.getElementById('hbdSong');
        const terminalBody = document.getElementById('terminalBody');

        const commands = [
            "> Connecting to local device... [SUCCESS]",
            "> Initializing LoveVirus.exe...",
            "> Bypassing system firewall... [OK]",
            "> Accessing personal data...",
            "> ERROR: Too much cuteness detected!",
            "> Finding 'The Only One'...",
            "> Found: Myat Noe Khin 😍",
            "> Stealing heart in progress...",
            "> 25% completed...",
            "> 50% completed...",
            "> 75% completed...",
            "> 100% COMPLETED!",
            "> WARNING: YOUR HEART IS NOW HACKED!",
            "> Redirecting to Birthday.Surprise..."
        ];

        async function runTerminal() {
            for (let i = 0; i < commands.length; i++) {
                let div = document.createElement('div');
                div.className = 'command-line';
                div.innerText = commands[i];
                terminalBody.appendChild(div);
                
                // စာတစ်ကြောင်းချင်းစီကို ဖြည်းဖြည်းချင်းပြမည်
                await new Promise(r => setTimeout(r, 400));
                div.classList.add('visible');
                
                // စာတွေအများကြီးဖြစ်လာလျှင် အလိုအလျောက် အောက်ဆုံးကို ရောက်အောင်လုပ်မည်
                terminalBody.scrollTop = terminalBody.scrollHeight;
            }
            
            // Terminal ပြီးလျှင် ကိတ်မုန့်ပြမည်
            setTimeout(() => {
                hackScreen.style.display = 'none';
                revealScreen.style.display = 'block';
                document.title = "Happy Birthday!";
                hbdSong.play();
                startRomanticTexts();
            }, 1000);
        }

        function startRomanticTexts() {
            setTimeout(() => {
                romanticMessage.innerText = "Now, you fixed this website error...";
                romanticMessage.classList.add('show-text');
            }, 1000);
            setTimeout(() => romanticMessage.classList.remove('show-text'), 4000);
            setTimeout(() => {
                romanticMessage.innerText = "But you still need to fix my heart error ❤️";
                romanticMessage.classList.add('show-text');
            }, 5000);
            setTimeout(() => romanticMessage.classList.remove('show-text'), 8000);
            setTimeout(() => {
                romanticMessage.innerText = "Tap screen to fix 👉👈";
                romanticMessage.classList.add('show-text');
            }, 9000);
        }

        fixErrorBtn.addEventListener('click', () => {
            introScreen.style.display = 'none';
            hackScreen.style.display = 'block';
            document.title = "SYSTEM COMPROMISED!";
            runTerminal();
        });

        revealScreen.addEventListener('click', () => {
            revealScreen.style.display = 'none';
            transitionScreen.style.display = 'flex';
            setTimeout(() => { window.location.href = 'memories.html'; }, 3500);
        });
    </script>
</body>
</html>
